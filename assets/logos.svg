<svg xmlns="http://www.w3.org/2000/svg" width="760" height="90">
  <rect width="100%" height="100%" fill="transparent"/>
  <g transform="translate(380,45)">
    <g id="logos">
      <circle cx="-180" cy="0" r="18" fill="#06b6d4"/>
      <circle cx="-90" cy="0" r="18" fill="#6366f1"/>
      <circle cx="0" cy="0" r="18" fill="#10b981"/>
      <circle cx="90" cy="0" r="18" fill="#f97316"/>
      <circle cx="180" cy="0" r="18" fill="#ef4444"/>
